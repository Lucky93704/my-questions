<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syllabus Dashboard - SSC Portal</title>

<style>
:root { --primary: #2563eb; --secondary: #1e40af; --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; --border: #e2e8f0; --success: #10b981; --warning: #f59e0b; --error: #ef4444;}
[data-theme="dark"] { --primary: #60a5fa; --secondary: #93c5fd; --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --border: #334155; --success: #34d399; --warning: #fbbf24; --error: #f87171;}

body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; max-width: 1100px; margin: auto; transition: 0.3s; }
a { text-decoration: none; }

/* Top Navigation */
.nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
.back-btn { background: var(--card-bg); color: var(--text); border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; font-weight: bold; transition: 0.2s; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
.back-btn:hover { border-color: var(--primary); color: var(--primary); }

.theme-toggle { background: none; border: none; cursor: pointer; color: var(--text); padding: 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
.theme-toggle:hover { background: var(--border); }
.theme-toggle svg { width: 28px; height: 28px; fill: none; stroke: currentColor; stroke-width: 2; transition: transform 0.5s; }
.rotate { transform: rotate(360deg); }

header { text-align: center; margin-bottom: 40px; }
header h1 { color: var(--primary); font-size: 2.2rem; margin: 0; }
header p { color: #64748b; font-size: 1.1rem; }

/* Loading State */
#loading-state { text-align: center; padding: 40px; font-size: 1.2rem; color: var(--primary); font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 15px; }
.spinner { width: 30px; height: 30px; border: 3px solid rgba(37, 99, 235, 0.2); border-radius: 50%; border-top-color: var(--primary); animation: spin 1s ease-in-out infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

#dashboard-content { display: none; }

/* Progress Overview & Chart Layout */
.overview-wrapper { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
.progress-overview { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border); flex: 2; min-width: 300px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
.chart-container { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); flex: 1; min-width: 280px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }

.progress-overview h3 { margin-top: 0; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;}
.sync-status { font-size: 0.8rem; font-weight: normal; color: #64748b; display: flex; align-items: center; gap: 5px;}
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block;}
.syncing .sync-dot { background: var(--warning); animation: pulse 1s infinite;}
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

.progress-bar-container { width: 100%; background-color: var(--border); border-radius: 8px; height: 20px; overflow: hidden; margin-bottom: 10px; }
.progress-bar-fill { height: 100%; background-color: var(--success); width: 0%; transition: width 0.5s ease-in-out; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem; font-weight: bold;}
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-top: 20px; }
.stat-box { background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 8px; text-align: center; }
.stat-box span { display: block; font-size: 1.5rem; font-weight: bold; color: var(--primary); }

/* Subject Analysis Grid */
.subject-analysis-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 30px; }
.subject-stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: transform 0.2s;}
.subject-stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.05); border-color: var(--primary);}
.subject-stat-card h4 { margin: 0 0 12px 0; color: var(--primary); font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center;}
.subject-stat-card .percent { font-size: 1.2rem; font-weight: bold; color: var(--text); }
.mini-progress { width: 100%; height: 8px; background: var(--border); border-radius: 4px; margin-bottom: 15px; overflow: hidden; }
.mini-progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.5s ease; }
.stat-badges { display: flex; flex-wrap: wrap; gap: 8px; font-size: 0.8rem; font-weight: bold; }
.badge { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text);}
.badge-weak { color: var(--error); background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); }
.badge-strong { color: var(--success); background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.2); }
.badge-overdue { color: var(--warning); background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); }

/* Subject Sections */
.subject-tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
.tab-btn { background: var(--card-bg); border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; cursor: pointer; color: var(--text); font-weight: bold; transition: 0.2s; white-space: nowrap; }
.tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.tab-btn:hover:not(.active) { border-color: var(--primary); }

.subject-content { display: none; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow-x: auto;}
.subject-content.active { display: block; animation: fadeIn 0.3s ease; }

/* Table Styles */
table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: left; min-width: 600px;}
th, td { padding: 12px; border-bottom: 1px solid var(--border); }
th { color: #64748b; font-weight: 600; font-size: 0.95rem;}

/* UPDATED: Added input[type="date"] to styling */
select, input[type="number"], input[type="date"] { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px; border-radius: 4px; outline: none; width: 100%; font-family: inherit;}
select:focus, input:focus { border-color: var(--primary); }

.status-done { color: var(--success); font-weight: bold; }
.status-doing { color: var(--warning); font-weight: bold; }

/* Mastery & Date Styles */
.mastery-weak { color: var(--error); font-weight: bold; }
.mastery-average { color: var(--warning); font-weight: bold; }
.mastery-strong { color: var(--success); font-weight: bold; }
.date-badge { font-size: 0.85rem; padding: 4px 8px; border-radius: 6px; background: var(--bg); border: 1px solid var(--border); display: inline-block;}
.date-overdue { border-color: var(--error); color: var(--error); background: rgba(239, 68, 68, 0.1); font-weight: bold;}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 768px) {
    th, td { padding: 8px; font-size: 0.9rem; }
    .progress-overview, .chart-container { flex: 1 1 100%; }
}
</style>
</head>

<script>
// ==========================================
// FIREBASE CONFIGURATION
// ==========================================
const firebaseConfig = {
    apiKey: "AIzaSyCAw1Eozvog8hUdZW7THJQBlgze79sCkGk",
    authDomain: "my-site-7fd99.firebaseapp.com",
    projectId: "my-site-7fd99",
    storageBucket: "my-site-7fd99.firebasestorage.app",
    messagingSenderId: "1024490010463",
    appId: "1:1024490010463:web:130447b333eaa7a5f468ea",
    measurementId: "G-WS0G17WRE9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const syllabusRef = db.collection("syllabusTracker").doc("mainProgress");
// ==========================================

// --- DEFAULT SYLLABUS DATA ---
const defaultData = {
    maths: [
        "Number System", "HCF and LCM", "Percentage", "Simple Interest", "Compound Interest", 
        "Installment", "Profit and Loss", "Discount", "Ratio and Proportion", "Partnership", 
        "Average", "Mixture & Alligation", "Time & Work (Pipe & Cistern)", "Time & Distance",

        "Height and Distance", "Coordinate Geometry", "Statistics", "Permutation & Combination", "Probability"
    ].map((topic, i) => ({ id: `m${i+1}`, topic, status: 'not-started', revision: 0, mastery: 'none', lastRevised: null })),
    
    english: [
        "Pronoun", "Adjective", "Main Verb", "Modals", "Noun", 
        "Adverb + Inversion + Subjunctive Mood", "Article", 
        "Subject Verb Agreement", "Tense", "Conjunction",

    ].map((topic, i) => ({ id: `e${i+1}`, topic, status: 'not-started', revision: 0, mastery: 'none', lastRevised: null })),
    
    gk: [
        "World Geo: Solar System", "World Geo: Latitude and Longitude", "World Geo: Earth's Interior & Plate Tectonics", "World Geo: Ocean and Continents", "World Geo: Rocks and Volcano", "World Geo: Geomorphic Processes", "World Geo: Landforms", "World Geo: Atmosphere", "World Geo: Condensation and Precipitation", "World Geo: Wind, Cyclone and Ocean Currents",
        "Indian Geo: India and its Location", "Indian Geo: Himalayas", "Indian Geo: Peninsular Plateau", "Indian Geo: Plains and Islands", "Indian Geo: Himalayan River System", "Indian Geo: Peninsular Rivers", "Indian Geo: Dams, Lakes and Waterfalls", "Indian Geo: Monsoon", "Indian Geo: Forests and Grasslands", "Indian Geo: Soil", "Indian Geo: Agriculture", "Indian Geo: Minerals", "Indian Geo: Transport", "Indian Geo: World Map",
        "Polity: Making of Constitution", "Polity: Salient Features of Constitution", "Polity: Preamble", "Polity: Part 1 and 2 of Constitution", "Polity: Fundamental Rights", "Polity: DPSP and Fundamental Duties", "Polity: President and Vice-President", "Polity: PM & CoM", "Polity: Parliament", "Polity: State Legislature", "Polity: Courts", "Polity: Local Bodies", "Polity: Constitutional and Non-Constitutional Bodies", "Polity: Emergency", "Polity: Amendments & Inter State Relations", "Polity: Historical Background (Acts)",
        "Economics: Basics of Economy", "Economics: Micro-Economics", "Economics: Inflation and Unemployment", "Economics: National Income", "Economics: Budget and Taxation", "Economics: Monetary Policy", "Economics: Banking System", "Economics: Balance of Payments", "Economics: Poverty", "Economics: Five Year Plan",
        "Ancient History: Stone Age", "Ancient History: Indus Valley Civilization", "Ancient History: Vedic Age", "Ancient History: Buddhism and Jainism", "Ancient History: Mahajanpadas and Magdha", "Ancient History: Mauryan Empire", "Ancient History: Post Mauryan Empire", "Ancient History: Sangam Age", "Ancient History: Gupta Era", "Ancient History: Post-Gupta Era", "Ancient History: Cholas and Tripartite Struggle",
        "Medieval History: Invasion of Islam", "Medieval History: Delhi Sultanate", "Medieval History: Vijaynagar Empire & Bahmani Kingdom", "Medieval History: Mughal Empire", "Medieval History: Aurangzeb and Later Mughals", "Medieval History: Marathas", "Medieval History: Bhakti & Sufi Movement",
        "Modern History: Advent of Europeans", "Modern History: Socio Religious Reform Movement", "Modern History: Revolt of 1857", "Modern History: Indian National Congress", "Modern History: Partition of Bengal", "Modern History: Gandhian Era", "Modern History: Bhagat Singh and Revolutionary Activities", "Modern History: Civil Disobedience Movement", "Modern History: Quit India Movement",
        "Physics", "Chemistry", "Biology"
    ].map((topic, i) => ({ id: `g${i+1}`, topic, status: 'not-started', revision: 0, mastery: 'none', lastRevised: null })),
    
    reasoning: [
        "Alphabet Test", "Coding Decoding", "Number & Letter Series", "Alphanumeric Series", 
        "Analogy & Similarity", "Classification", "Direction Test", "Blood Relation", 
        "Order & Ranking", "Seating Arrangement", "Puzzle", "Syllogism", "Inequalities", 
        "Calendar", "Clock", "Data Sufficiency", "Venn Diagram", "Mathematical Operations", 
        "Arithmetical Reasoning", "Input Output", "Character Puzzle", "Course of Action", 
        "Statement & Assumption", "Statement & Arguments", "Cause & Effect", 
        "Counting of figures", "Dice", "Cube & Cuboid", "Mirror/Water Image", 
        "Paper cutting & folding", "Embedded Figures", "Incomplete Figures", 
        "Non Verbal Series", "Non Verbal Analogy", "Non Verbal Classification", 
        "Statement and conclusion"
    ].map((topic, i) => ({ id: `r${i+1}`, topic, status: 'not-started', revision: 0, mastery: 'none', lastRevised: null }))
};

const displayNames = { maths: "Mathematics", english: "English", gk: "General Knowledge", reasoning: "Reasoning" };

let syllabusData = {};
let radarChartInstance = null;

// --- INITIALIZE & LOAD FROM FIREBASE ---
async function loadSyllabusData() {
    try {
        const doc = await syllabusRef.get();
        
        if (doc.exists) {
            syllabusData = doc.data();
            
            // Smart Sync: Inject new topics if added to defaultData later
            for (let subject in defaultData) {
                if (!syllabusData[subject]) {
                    syllabusData[subject] = defaultData[subject];
                } else {
                    const existingTopics = syllabusData[subject].map(item => item.topic);
                    defaultData[subject].forEach(defaultItem => {
                        if (!existingTopics.includes(defaultItem.topic)) {
                            syllabusData[subject].push(defaultItem);
                        }
                    });
                    
                    // Patch old structures missing new fields
                    syllabusData[subject].forEach(item => {
                        if (!item.mastery) item.mastery = 'none';
                        if (item.lastRevised === undefined) item.lastRevised = null;
                    });
                }
            }
        } else {
            // First time loading ever - save defaults to DB
            syllabusData = JSON.parse(JSON.stringify(defaultData));
            await syllabusRef.set(syllabusData);
        }

        // Hide loader, show dashboard
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('dashboard-content').style.display = 'block';
        
        renderTables();
        
    } catch (error) {
        console.error("Error loading syllabus from Firebase:", error);
        document.getElementById('loading-state').innerHTML = `<span style="color:var(--error);">Failed to connect to database. Please refresh.</span>`;
    }
}

// --- UPDATED: renderTables() to use <input type="date"> ---
function renderTables() {
    const subjects = ['maths', 'english', 'gk', 'reasoning'];
    
    subjects.forEach(subject => {
        const container = document.getElementById(subject);
        let tableHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Topic</th>
                        <th style="width: 130px;">Status</th>
                        <th style="width: 130px;">Mastery</th>
                        <th style="width: 80px; text-align:center;">Revisions</th>
                        <th style="width: 140px;">Last Revised</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        syllabusData[subject].forEach((item, index) => {
            let dateValue = ""; 
            let dateClass = "date-badge";
            
            if (item.lastRevised) {
                const revDate = new Date(item.lastRevised);
                // Format to YYYY-MM-DD required for <input type="date">
                const year = revDate.getFullYear();
                const month = String(revDate.getMonth() + 1).padStart(2, '0');
                const day = String(revDate.getDate()).padStart(2, '0');
                dateValue = `${year}-${month}-${day}`;
                
                const diffDays = (new Date() - revDate) / (1000 * 60 * 60 * 24);
                if (diffDays > 14 && item.revision > 0) {
                    dateClass += " date-overdue";
                }
            }

            tableHTML += `
                <tr>
                    <td>${item.topic}</td>
                    <td>
                        <select onchange="updateData('${subject}', ${index}, 'status', this.value)" class="${item.status === 'done' ? 'status-done' : item.status === 'doing' ? 'status-doing' : ''}">
                            <option value="not-started" ${item.status === 'not-started' ? 'selected' : ''}>Not Started</option>
                            <option value="doing" ${item.status === 'doing' ? 'selected' : ''}>In Progress</option>
                            <option value="done" ${item.status === 'done' ? 'selected' : ''}>Completed</option>
                        </select>
                    </td>
                    <td>
                        <select onchange="updateData('${subject}', ${index}, 'mastery', this.value)" class="mastery-${item.mastery}">
                            <option value="none" ${item.mastery === 'none' ? 'selected' : ''}>— Assess —</option>
                            <option value="weak" ${item.mastery === 'weak' ? 'selected' : ''}>🔴 Weak</option>
                            <option value="average" ${item.mastery === 'average' ? 'selected' : ''}>🟡 Average</option>
                            <option value="strong" ${item.mastery === 'strong' ? 'selected' : ''}>🟢 Strong</option>
                        </select>
                    </td>
                    <td style="text-align:center;">
                        <input type="number" min="0" max="99" value="${item.revision}" onchange="updateData('${subject}', ${index}, 'revision', this.value)" style="text-align:center;">
                    </td>
                    <td>
                        <input type="date" class="${dateClass}" value="${dateValue}" onchange="updateData('${subject}', ${index}, 'lastRevised', this.value)">
                    </td>
                </tr>
            `;
        });
        
        tableHTML += `</tbody></table>`;
        container.innerHTML = tableHTML;
    });
    
    updateAnalytics();
}

// --- UPDATED: updateData() to handle date input logic ---
function updateData(subject, index, field, value) {
    const syncIndicator = document.getElementById('sync-indicator');
    syncIndicator.classList.add('syncing');
    syncIndicator.innerHTML = '<span class="sync-dot"></span> Saving...';

    if (field === 'revision') {
        const newRev = parseInt(value) || 0;
        // Auto-update date only if revision goes up and we don't already have a date for today
        if (newRev > syllabusData[subject][index].revision) {
            syllabusData[subject][index].lastRevised = new Date().toISOString();
        }
        syllabusData[subject][index][field] = newRev;
        renderTables(); 
    } else if (field === 'lastRevised') {
        // Handle manual date edits or deletions
        syllabusData[subject][index].lastRevised = value ? new Date(value).toISOString() : null;
        renderTables();
    } else {
        syllabusData[subject][index][field] = value;
        if (field === 'status' || field === 'mastery') {
            renderTables(); 
        } else {
            updateAnalytics();
        }
    }
    
    // Push changes to Firebase
    syllabusRef.set(syllabusData).then(() => {
        setTimeout(() => {
            syncIndicator.classList.remove('syncing');
            syncIndicator.innerHTML = '<span class="sync-dot"></span> Saved to Cloud';
        }, 500);
    }).catch(err => {
        console.error("Error saving to Firebase:", err);
        syncIndicator.classList.remove('syncing');
        syncIndicator.innerHTML = '<span class="sync-dot" style="background:var(--error);"></span> Sync Failed';
        alert("Failed to sync progress to database. Check your connection.");
    });
}

// --- ANALYTICS LOGIC & RADAR CHART ---
function updateAnalytics() {
    let total = 0, completed = 0, doing = 0, totalRevs = 0;
    let subjectStats = { maths: 0, english: 0, gk: 0, reasoning: 0 };
    
    const analysisGrid = document.getElementById('subject-analysis-grid');
    analysisGrid.innerHTML = ''; 

    for (const subject in syllabusData) {
        let subjTotal = 0, subjDone = 0, weakCount = 0, strongCount = 0, overdueCount = 0;
        
        syllabusData[subject].forEach(item => {
            total++; subjTotal++;
            if (item.status === 'done') { completed++; subjDone++; }
            if (item.status === 'doing') doing++;
            if (item.mastery === 'weak') weakCount++;
            if (item.mastery === 'strong') strongCount++;
            totalRevs += item.revision;

            if (item.lastRevised && item.revision > 0) {
                const diffDays = (new Date() - new Date(item.lastRevised)) / (1000 * 60 * 60 * 24);
                if (diffDays > 14) overdueCount++;
            }
        });
        
        const subjPercent = subjTotal === 0 ? 0 : Math.round((subjDone / subjTotal) * 100);
        subjectStats[subject] = subjPercent;

        const card = document.createElement('div');
        card.className = 'subject-stat-card';
        card.innerHTML = `
            <h4>${displayNames[subject]} <span class="percent">${subjPercent}%</span></h4>
            <div class="mini-progress"><div class="mini-progress-fill" style="width: ${subjPercent}%;"></div></div>
            <div class="stat-badges">
                ${weakCount > 0 ? `<span class="badge badge-weak">🔴 ${weakCount} Weak</span>` : ''}
                ${strongCount > 0 ? `<span class="badge badge-strong">🟢 ${strongCount} Strong</span>` : ''}
                ${overdueCount > 0 ? `<span class="badge badge-overdue">⚠️ ${overdueCount} Overdue</span>` : ''}
                ${weakCount === 0 && strongCount === 0 && overdueCount === 0 ? `<span class="badge" style="opacity:0.6;">No data yet</span>` : ''}
            </div>
        `;
        analysisGrid.appendChild(card);
    }
    
    const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
    
    document.getElementById('total-topics').innerText = total;
    document.getElementById('completed-topics').innerText = completed;
    document.getElementById('doing-topics').innerText = doing;
    document.getElementById('total-revisions').innerText = totalRevs;
    
    const progressBar = document.getElementById('overall-progress');
    progressBar.style.width = percent + '%';
    progressBar.innerText = percent > 5 ? percent + '%' : '';

    updateRadarChart(subjectStats);
}

function updateRadarChart(stats) {
    const ctx = document.getElementById('radarChart').getContext('2d');
    const data = [stats.maths, stats.english, stats.gk, stats.reasoning];
    const textColor = document.body.getAttribute('data-theme') === 'dark' ? '#cbd5e1' : '#64748b';
    const gridColor = document.body.getAttribute('data-theme') === 'dark' ? '#334155' : '#e2e8f0';

    if (radarChartInstance) {
        radarChartInstance.data.datasets[0].data = data;
        radarChartInstance.options.scales.r.pointLabels.color = textColor;
        radarChartInstance.options.scales.r.grid.color = gridColor;
        radarChartInstance.options.scales.r.angleLines.color = gridColor;
        radarChartInstance.update();
    } else {
        radarChartInstance = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['Maths', 'English', 'GK', 'Reasoning'],
                datasets: [{
                    label: 'Syllabus Coverage (%)',
                    data: data,
                    backgroundColor: 'rgba(37, 99, 235, 0.2)',
                    borderColor: 'rgba(37, 99, 235, 1)',
                    pointBackgroundColor: 'rgba(37, 99, 235, 1)',
                    borderWidth: 2,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    r: {
                        beginAtZero: true,
                        max: 100,
                        ticks: { display: false, stepSize: 25 },
                        pointLabels: { color: textColor, font: { family: "'Segoe UI', sans-serif", size: 12, weight: 'bold' } },
                        grid: { color: gridColor },
                        angleLines: { color: gridColor }
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    }
}

// --- TAB SWITCHING ---
function switchTab(tabId) {
    document.querySelectorAll('.subject-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    
    document.getElementById(tabId).classList.add('active');
    event.target.classList.add('active');
}

// --- THEME LOGIC ---
const themeBtn = document.getElementById('theme-btn');
const themeIcon = document.getElementById('theme-icon');
const body = document.body;
const sunPath = "M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z";
const moonPath = "M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z";

if (localStorage.getItem('theme') === 'dark') {
    body.setAttribute('data-theme', 'dark');
    themeIcon.innerHTML = `<path d="${moonPath}" />`;
} else {
    themeIcon.innerHTML = `<path d="${sunPath}" />`;
}

themeBtn.addEventListener('click', () => {
    themeIcon.classList.add('rotate');
    setTimeout(() => {
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
            themeIcon.innerHTML = `<path d="${sunPath}" />`;
        } else {
            body.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            themeIcon.innerHTML = `<path d="${moonPath}" />`;
        }
        updateAnalytics(); 
    }, 250);
    setTimeout(() => { themeIcon.classList.remove('rotate'); }, 500);
});

// Initialize on load
window.onload = loadSyllabusData;
