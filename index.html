<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasneem's SSC Portal</title>
<style>
:root { --primary: #2563eb; --secondary: #1e40af; --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; --border: #e2e8f0; --error: #ef4444; }
[data-theme="dark"] { --primary: #60a5fa; --secondary: #93c5fd; --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --border: #334155; --error: #f87171; }

body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; max-width: 1000px; margin: auto; transition: 0.3s; }
a { text-decoration: none; }

.theme-toggle { position: absolute; top: 20px; right: 20px; background: none; border: none; cursor: pointer; color: var(--text); padding: 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
.theme-toggle:hover { background: var(--border); }
.theme-toggle svg { width: 28px; height: 28px; fill: none; stroke: currentColor; stroke-width: 2; transition: transform 0.5s; }
.rotate { transform: rotate(360deg); }

/* Hidden by default until unlocked */
#main-content { display: none; }

header { text-align: center; margin-bottom: 40px; }
header h1 { color: var(--primary); font-size: 2.5rem; margin: 0; }
header p { color: #64748b; font-size: 1.1rem; }

#home-screen { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
.subject-card { background: var(--card-bg); padding: 40px 20px; text-align: center; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); font-size: 1.5rem; font-weight: bold; color: var(--primary); display: block; transition: 0.2s; border: 2px solid transparent; cursor: pointer; font-family: inherit;}
.subject-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-color: var(--primary); color: var(--secondary); }

/* PIN Screen Styles */
#pin-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 10vh; text-align: center;}
#pin-screen h2 { color: var(--primary); margin-bottom: 10px; font-size: 2rem;}
#pin-screen p { color: #64748b; margin-bottom: 20px; font-size: 0.95rem; }
.pin-input-group { display: flex; flex-direction: column; align-items: center; gap: 15px; }
#pin-input { font-size: 1.5rem; letter-spacing: 5px; text-align: center; padding: 10px; width: 120px; border-radius: 8px; border: 2px solid var(--border); background: var(--card-bg); color: var(--text); outline: none; transition: 0.2s; }
#pin-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }
#unlock-btn { background: var(--primary); color: white; border: none; padding: 10px 25px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 600; display: flex; align-items: center; justify-content: center; min-width: 120px;}
#unlock-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-2px); }
#error-msg { color: var(--error); font-weight: 600; margin-top: 15px; display: none; }

/* Logout Button Styles */
.logout-container { text-align: center; margin-top: 40px; }
#logout-btn { background: transparent; color: var(--error); border: 2px solid var(--error); padding: 8px 20px; font-size: 1rem; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; min-width: 120px;}
#logout-btn:hover:not(:disabled) { background: var(--error); color: white; transform: translateY(-2px); }

/* Modal Styles for Dashboard Selection */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(4px); animation: fadeIn 0.3s ease; }
.modal-content { background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border); text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
.modal-content h3 { margin-top: 0; margin-bottom: 20px; color: var(--primary); font-size: 1.5rem; }
.modal-options { display: flex; flex-direction: column; gap: 15px; }
.modal-btn { background: var(--bg); border: 2px solid var(--border); padding: 15px; border-radius: 8px; color: var(--text); font-weight: bold; font-size: 1.1rem; transition: 0.2s; text-decoration: none; display: block; }
.modal-btn:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
.close-modal { margin-top: 20px; background: transparent; border: none; color: #64748b; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s;}
.close-modal:hover { color: var(--error); }

/* Login Animations */
@keyframes fadeOutUp { to { opacity: 0; transform: translateY(-20px); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.anim-fade-out { animation: fadeOutUp 0.4s ease forwards; }
.anim-fade-in { animation: fadeIn 0.5s ease forwards; }

.spinner {
    display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%; border-top-color: currentColor; animation: spin 1s ease-in-out infinite; margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<button class="theme-toggle" id="theme-btn">
<svg id="theme-icon" viewBox="0 0 24 24"></svg>
</button>

<div id="pin-screen">
    <h2>Access Portal</h2>
    <p>Please enter the dynamic PIN</p>
    <div class="pin-input-group">
        <input type="password" id="pin-input" maxlength="4" placeholder="••••" inputmode="numeric">
        <button id="unlock-btn">Unlock</button>
    </div>
    
    <div style="margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px;">
        <input type="checkbox" id="remember-me" style="cursor: pointer; width: 16px; height: 16px; accent-color: var(--primary);">
        <label for="remember-me" style="cursor: pointer; font-size: 0.95rem; color: var(--text);">Remember this device</label>
    </div>
    
    <p id="error-msg">Incorrect PIN. Try again.</p>
</div>

<div id="main-content">
    <header>
        <h1>Study Dashboard</h1>
        <p>Targeting 100% Accuracy</p>
    </header>

    <div id="home-screen">
        <button onclick="document.getElementById('dashboard-modal').style.display='flex'" class="subject-card" style="grid-column: 1 / -1; background: transparent; border: 2px dashed var(--primary); width: 100%;">
            Dashboard 📊
        </button>
    </div>

    <div class="logout-container">
        <button id="logout-btn">Lock Portal</button>
    </div>
</div>

<div id="dashboard-modal" class="modal-overlay" onclick="if(event.target === this) this.style.display='none'">
    <div class="modal-content">
        <h3>Select Dashboard</h3>
        <div class="modal-options">
            <a href="doubtsdashboard.html" class="modal-btn">📉 Doubts Dashboard</a>
            <a href="studydashboard.html" class="modal-btn">🎯 Study Dashboard</a>
            <a href="syllabus.html" class="modal-btn">📚 Syllabus Dashboard</a>
        </div>
        <button class="close-modal" onclick="document.getElementById('dashboard-modal').style.display='none'">Cancel</button>
    </div>
</div>

<script>
// --- SESSION CHECK ---
if (sessionStorage.getItem('isUnlocked') === 'true' || localStorage.getItem('isUnlocked') === 'true') {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
}

// --- PIN LOGIC ---
function getISTTimePin() {
    const now = new Date();
    const options = { 
        timeZone: 'Asia/Kolkata', 
        hour: '2-digit', 
        minute: '2-digit', 
        hour12: false 
    };
    
    let timeString = new Intl.DateTimeFormat('en-IN', options).format(now);
    return timeString.replace(':', '');
}

function attemptUnlock() {
    const enteredPin = document.getElementById('pin-input').value;
    const correctPin = getISTTimePin();
    const unlockBtn = document.getElementById('unlock-btn');
    
    if (enteredPin === correctPin) {
        unlockBtn.innerHTML = '<span class="spinner"></span> Unlocking...';
        unlockBtn.disabled = true;
        document.getElementById('pin-input').disabled = true;
        
        const rememberMe = document.getElementById('remember-me').checked;
        if (rememberMe) {
            localStorage.setItem('isUnlocked', 'true');
        } else {
            sessionStorage.setItem('isUnlocked', 'true');
        }
        
        setTimeout(() => {
            const pinScreen = document.getElementById('pin-screen');
            const mainContent = document.getElementById('main-content');
            
            pinScreen.classList.remove('anim-fade-in');
            pinScreen.classList.add('anim-fade-out');
            
            setTimeout(() => {
                pinScreen.style.display = 'none';
                mainContent.style.display = 'block';
                mainContent.classList.remove('anim-fade-out');
                mainContent.classList.add('anim-fade-in');
            }, 400);
        }, 500);
        
    } else {
        const errorMsg = document.getElementById('error-msg');
        errorMsg.style.display = 'block';
        document.getElementById('pin-input').value = '';
        document.getElementById('pin-input').focus();
        
        setTimeout(() => {
            errorMsg.style.display = 'none';
        }, 2000);
    }
}

// --- LOGOUT LOGIC ---
function handleLogout() {
    const logoutBtn = document.getElementById('logout-btn');
    logoutBtn.innerHTML = '<span class="spinner"></span> Locking...';
    logoutBtn.disabled = true;
    
    sessionStorage.removeItem('isUnlocked');
    localStorage.removeItem('isUnlocked');
    
    setTimeout(() => {
        const pinScreen = document.getElementById('pin-screen');
        const mainContent = document.getElementById('main-content');
        
        mainContent.classList.remove('anim-fade-in');
        mainContent.classList.add('anim-fade-out');
        
        setTimeout(() => {
            mainContent.style.display = 'none';
            
            const unlockBtn = document.getElementById('unlock-btn');
            unlockBtn.innerHTML = 'Unlock';
            unlockBtn.disabled = false;
            
            const pinInput = document.getElementById('pin-input');
            pinInput.value = '';
            pinInput.disabled = false;
            
            document.getElementById('remember-me').checked = false;
            
            pinScreen.classList.remove('anim-fade-out');
            pinScreen.style.display = 'flex';
            pinScreen.classList.add('anim-fade-in');
            
            logoutBtn.innerHTML = 'Lock Portal';
            logoutBtn.disabled = false;
            
        }, 400);
    }, 500);
}

// Event Listeners
document.getElementById('unlock-btn').addEventListener('click', attemptUnlock);
document.getElementById('pin-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') { attemptUnlock(); }
});
document.getElementById('logout-btn').addEventListener('click', handleLogout);

// --- THEME LOGIC ---
const themeBtn = document.getElementById('theme-btn');
const themeIcon = document.getElementById('theme-icon');
const body = document.body;
const sunPath = "M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z";
const moonPath = "M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z";

if (localStorage.getItem('theme') === 'dark') {
    body.setAttribute('data-theme', 'dark');
    themeIcon.innerHTML = `<path d="${moonPath}" />`;
} else {
    themeIcon.innerHTML = `<path d="${sunPath}" />`;
}

themeBtn.addEventListener('click', () => {
    themeIcon.classList.add('rotate');
    setTimeout(() => {
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
            themeIcon.innerHTML = `<path d="${sunPath}" />`;
        } else {
            body.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            themeIcon.innerHTML = `<path d="${moonPath}" />`;
        }
    }, 250);
    setTimeout(() => { themeIcon.classList.remove('rotate'); }, 500);
});
</script>

</body>
</html>
