<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Portal - Global Hub</title>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<style>
:root { --primary: #2563eb; --secondary: #1e40af; --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; --border: #e2e8f0; --error: #ef4444; --success: #22c55e; --target: #8b5cf6;}
[data-theme="dark"] { --primary: #60a5fa; --secondary: #93c5fd; --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --border: #334155; --error: #f87171; --success: #4ade80; --target: #a78bfa;}

body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; max-width: 1000px; margin: auto; transition: background-color 0.3s, color 0.3s; overflow-x: hidden; }
a { text-decoration: none; }

/* Utility Classes for SVGs */
.icon-text { display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
svg { flex-shrink: 0; }

.theme-toggle { position: absolute; top: 20px; right: 20px; background: var(--card-bg); border: 1px solid var(--border); cursor: pointer; color: var(--text); padding: 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); z-index: 1000;}
.theme-toggle:hover { transform: translateY(-3px); border-color: var(--primary); color: var(--primary); }
.theme-toggle svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; transition: transform 0.5s; }
.rotate { transform: rotate(360deg); }

#main-content { display: none; }

header { text-align: center; margin-bottom: 40px; }
header h1 { color: var(--primary); font-size: 2.5rem; margin: 0; }
header p { color: #64748b; font-size: 1.1rem; }

/* At a Glance Widget */
.glance-widget { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; }
.glance-card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); min-width: 200px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex: 1; max-width: 300px; transition: transform 0.3s; animation: slideUp 0.6s ease-out forwards; opacity: 0; transform: translateY(20px); }
.glance-card:nth-child(2) { animation-delay: 0.1s; }
.glance-card:hover { transform: translateY(-5px); border-color: var(--primary); }
.glance-value { font-size: 2rem; font-weight: bold; color: var(--primary); margin: 10px 0; display: flex; justify-content: center; align-items: center; gap: 10px;}
.glance-title { color: #64748b; font-size: 0.95rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 6px; }

#home-screen { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
.subject-card { background: var(--bg); padding: 30px 20px; text-align: center; border-radius: 12px; font-size: 1.3rem; font-weight: bold; color: var(--primary); display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; border: 2px dashed var(--primary); cursor: pointer; font-family: inherit; width: 100%; box-sizing: border-box; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; animation-delay: 0.2s;}
.subject-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 10px 15px rgba(37, 99, 235, 0.15); background: var(--primary); color: white; border-style: solid; }

/* PIN Screen Styles */
#pin-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 10vh; text-align: center;}
#pin-screen h2 { color: var(--primary); margin-bottom: 10px; font-size: 2rem; display: flex; align-items: center; gap: 10px; justify-content: center;}
#pin-screen p { color: #64748b; margin-bottom: 20px; font-size: 0.95rem; }
.pin-input-group { display: flex; flex-direction: column; align-items: center; gap: 15px; }
#pin-input { font-size: 1.5rem; letter-spacing: 5px; text-align: center; padding: 12px; width: 140px; border-radius: 8px; border: 2px solid var(--border); background: var(--card-bg); color: var(--text); outline: none; transition: 0.3s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
#pin-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }
#unlock-btn { background: var(--primary); color: white; border: none; padding: 12px 25px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; min-width: 140px;}
#unlock-btn:hover:not(:disabled) { background: var(--secondary); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3); }

/* Logout Button Styles */
.logout-container { text-align: center; margin-top: 40px; }
#logout-btn { background: transparent; color: var(--error); border: 2px solid var(--error); padding: 10px 20px; font-size: 1rem; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; gap: 8px; min-width: 140px;}
#logout-btn:hover:not(:disabled) { background: var(--error); color: white; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2); }

/* Modal Styles */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(4px); animation: fadeInOverlay 0.3s ease; }
.modal-content { background: var(--card-bg); padding: 30px; border-radius: 16px; border: 1px solid var(--border); text-align: center; width: 90%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.modal-content h3 { margin-top: 0; margin-bottom: 25px; color: var(--primary); font-size: 1.6rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
.modal-options { display: flex; flex-direction: column; gap: 12px; }
.modal-btn { background: var(--bg); border: 2px solid var(--border); padding: 16px; border-radius: 10px; color: var(--text); font-weight: 600; font-size: 1.1rem; transition: 0.2s; text-decoration: none; display: flex; align-items: center; gap: 12px; }
.modal-btn svg { color: var(--primary); transition: 0.2s; }
.modal-btn:hover { border-color: var(--primary); background: var(--card-bg); transform: translateX(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
.modal-btn:hover svg { transform: scale(1.2); }
.close-modal { margin-top: 25px; background: transparent; border: 2px solid transparent; color: #64748b; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px;}
.close-modal:hover { color: var(--error); border-color: var(--error); background: rgba(239, 68, 68, 0.05); }

/* Custom Toast Notifications */
#toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
.toast { background: var(--card-bg); color: var(--text); padding: 14px 20px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border-left: 5px solid var(--primary); display: flex; align-items: center; gap: 12px; font-weight: 500; animation: slideInRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), fadeOut 0.4s ease 3s forwards; pointer-events: auto; }
.toast.error { border-left-color: var(--error); }
.toast.success { border-left-color: var(--success); }
.toast svg { flex-shrink: 0; }

/* Animations */
@keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); visibility: hidden; } }
@keyframes fadeOutUp { to { opacity: 0; transform: translateY(-20px); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
@keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
@keyframes fadeInOverlay { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(4px); } }

.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top-color: currentColor; animation: spin 1s ease-in-out infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.anim-fade-out { animation: fadeOutUp 0.4s ease forwards; }
.anim-fade-in { animation: fadeIn 0.5s ease forwards; }
</style>
</head>
<body>

<div id="toast-container"></div>

<button class="theme-toggle" id="theme-btn" title="Toggle Theme">
    <svg id="theme-icon" viewBox="0 0 24 24"></svg>
</button>

<div id="pin-screen">
    <h2>
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        Access Portal
    </h2>
    <p>Please enter the dynamic PIN</p>
    <div class="pin-input-group">
        <input type="password" id="pin-input" maxlength="4" placeholder="••••" inputmode="numeric" autocomplete="off">
        <button id="unlock-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>
            Unlock

    <div style="margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px;">

        <label for="remember-me" style="cursor: pointer; font-size: 0.95rem; color: var(--text);">Remember this device</label>

</div>

<div id="main-content">
    <header>
        <h1 id="greeting-text">Welcome, </h1>
        <p id="daily-quote" style="color: var(--secondary); font-style: italic; font-weight: 500; margin-top: 8px;">"Loading motivation..."</p>
    </header>

    <div class="glance-widget">
        <div class="glance-card">
            <div class="glance-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                Today's Targets
            </div>
            <div class="glance-value" id="glance-targets" style="color: var(--target);">
                <span class="spinner" style="border-top-color: var(--target);"></span>
            </div>
            <div style="font-size: 0.85rem; color: #64748b;" id="glance-targets-subtext">Loading progress...</div>
        </div>
        
        <div class="glance-card">
            <div class="glance-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
                Current Streak
            </div>
            <div class="glance-value" style="color: #ea580c;">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M11.71 1.63L12 1.93c.69 1.15 1.77 2.11 3.01 2.72 2.05 1 3.99 2.5 3.99 5.35 0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.85 1.94-4.35 3.99-5.35 1.24-.61 2.32-1.57 3.01-2.72l.29-.3z"/></svg>
                <span id="glance-streak"><span class="spinner" style="border-top-color: #ea580c;"></span></span>
            </div>
            <div style="font-size: 0.85rem; color: #64748b;">Consecutive 100% days</div>
        </div>
    </div>

    <div id="home-screen">
        <button onclick="document.getElementById('dashboard-modal').style.display='flex'" class="subject-card">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            Open Dashboards
        </button>

    <div class="logout-container">
        <button id="logout-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Lock Portal
        </button>
    </div>
</div>

<div id="dashboard-modal" class="modal-overlay" onclick="if(event.target === this) this.style.display='none'">
    <div class="modal-content">
        <h3>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 16 16 12 12 8"></polyline><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            Select Dashboard
        </h3>
        <div class="modal-options">
            <a href="doubtsdashboard.html" class="modal-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></svg>
                Doubts Dashboard
            </a>
            <a href="studydashboard.html" class="modal-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
                Study Dashboard
            </a>
            <a href="syllabusdashboard.html" class="modal-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                Syllabus Dashboard
            </a>
        </div>
        <button class="close-modal" onclick="document.getElementById('dashboard-modal').style.display='none'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            Cancel
        </button>
    </div>
</div>

<script>
// ==========================================
// TOAST NOTIFICATION SYSTEM
// ==========================================
function showToast(message, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    
    let iconSvg = '';
    if (type === 'error') {
        iconSvg = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
    } else if (type === 'success') {
        iconSvg = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
    } else {
        iconSvg = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
    }

    toast.innerHTML = `${iconSvg} <span>${message}</span>`;
    container.appendChild(toast);
    
    // Auto remove after animation ends
    setTimeout(() => {
        if(toast.parentElement) toast.remove();
    }, 3400);
}

// ==========================================
// FIREBASE CONFIGURATION & INIT
// ==========================================
const firebaseConfig = {
    apiKey: "AIzaSyCAw1Eozvog8hUdZW7THJQBlgze79sCkGk",
    authDomain: "my-site-7fd99.firebaseapp.com",
    projectId: "my-site-7fd99",
    storageBucket: "my-site-7fd99.firebasestorage.app",
    messagingSenderId: "1024490010463",
    appId: "1:1024490010463:web:130447b333eaa7a5f468ea",
    measurementId: "G-WS0G17WRE9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function getLocalISOString(date) {
    const offset = date.getTimezoneOffset() * 60000;
    return (new Date(date - offset)).toISOString().split('T')[0];
}

// --- AT A GLANCE LOGIC ---
async function loadGlanceData() {
    try {
        const todayStr = getLocalISOString(new Date());
        
        // Load Today's Targets
        const targetSnap = await db.collection("dailyTargets").where("date", "==", todayStr).get();
        let totalTasks = 0;
        let completedTasks = 0;
        let isHoliday = false;

        targetSnap.forEach(doc => {
            const data = doc.data();
            if (data.isHoliday || data.subject === "Holiday" || (data.task && data.task.startsWith("Holiday:"))) {
                isHoliday = true;
            } else {
                totalTasks++;
                if (data.completed) completedTasks++;
            }
        });

        const targetEl = document.getElementById('glance-targets');
        const targetSubEl = document.getElementById('glance-targets-subtext');

        if (isHoliday) {
            targetEl.innerHTML = `🌴 Rest Day`;
            targetSubEl.innerHTML = `Holiday mode active.`;
            targetEl.style.color = '#f59e0b';
        } else if (totalTasks === 0) {
            targetEl.innerHTML = `0 / 0`;
            targetSubEl.innerHTML = `No tasks scheduled yet.`;
        } else {
            const pct = Math.round((completedTasks/totalTasks)*100);
            targetEl.innerHTML = `${completedTasks} / ${totalTasks}`;
            targetSubEl.innerHTML = `${pct}% Completion`;
            if (pct === 100) targetEl.style.color = 'var(--success)';
        }

        // Load Streak
        const startLimit = new Date();
        startLimit.setDate(startLimit.getDate() - 90);
        const startLimitStr = getLocalISOString(startLimit);

        const streakSnap = await db.collection("dailyTargets")
            .where("date", ">=", startLimitStr)
            .where("date", "<=", todayStr)
            .get();

        const daysData = {};
        streakSnap.forEach(doc => {
            const data = doc.data();
            if (data.isHoliday || data.subject === "Holiday" || (data.task && data.task.startsWith("Holiday:"))) {
                if (!daysData[data.date]) daysData[data.date] = { total: 1, completed: 0 };
            } else {
                if (!daysData[data.date]) daysData[data.date] = { total: 0, completed: 0 };
                daysData[data.date].total++;
                if (data.completed) daysData[data.date].completed++;
            }
        });

        let currentStreak = 0;
        let checkDate = new Date();
        let checkingCurrent = true;

        if (!(daysData[todayStr] && daysData[todayStr].total > 0 && daysData[todayStr].completed === daysData[todayStr].total)) {
            checkDate.setDate(checkDate.getDate() - 1); 
        }

        for (let i = 0; i < 90; i++) {
            const dateStr = getLocalISOString(checkDate);
            const isComplete = daysData[dateStr] && daysData[dateStr].total > 0 && daysData[dateStr].completed === daysData[dateStr].total;

            if (isComplete) {
                currentStreak++;
            } else {
                break; 
            }
            checkDate.setDate(checkDate.getDate() - 1);
        }

        document.getElementById('glance-streak').innerText = `${currentStreak} Days`;

    } catch (e) {
        console.error("Failed to load glance data:", e);
        document.getElementById('glance-targets').innerText = "Err";
        document.getElementById('glance-streak').innerText = "Err";
    }
}


// --- DYNAMIC GREETING & MOTIVATION ---
function setGreetingAndQuote() {
    const greetingElement = document.getElementById('greeting-text');
    const quoteElement = document.getElementById('daily-quote');
    
    const hour = new Date().getHours();
    let greeting = "Hello";
    if (hour >= 5 && hour < 12) greeting = "Good Morning";
    else if (hour >= 12 && hour < 17) greeting = "Good Afternoon";
    else if (hour >= 17 && hour < 22) greeting = "Good Evening";
    else greeting = "Late Night Study";
    
    greetingElement.innerText = `${greeting}`;

    const quotes = [
        "Discipline is choosing between what you want now and what you want most.",
        "Success is the sum of small efforts, repeated day in and day out.",
        "100% accuracy isn't a gift, it's a skill.",
        "Don't stop when you're tired. Stop when you're done.",
        "The secret of your future is hidden in your daily routine.",
        "Every mistake tracked is a mark secured in the real exam.",
        "Focus on the step in front of you, not the whole staircase."
    ];

    const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
    quoteElement.innerText = `"${randomQuote}"`;
}

// --- SESSION CHECK ---
if (sessionStorage.getItem('isUnlocked') === 'true' || localStorage.getItem('isUnlocked') === 'true') {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    setGreetingAndQuote(); 
    loadGlanceData(); 
}

// --- PIN LOGIC ---
function getISTTimePin() {
    const now = new Date();
    const options = { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', hour12: false };
    let timeString = new Intl.DateTimeFormat('en-IN', options).format(now);
    return timeString.replace(':', '');
}

function attemptUnlock() {
    const enteredPin = document.getElementById('pin-input').value;
    const correctPin = getISTTimePin();
    const unlockBtn = document.getElementById('unlock-btn');
    const originalBtnHTML = unlockBtn.innerHTML;
    
    if (enteredPin === correctPin) {
        unlockBtn.innerHTML = '<span class="spinner"></span> Unlocking...';
        unlockBtn.disabled = true;
        document.getElementById('pin-input').disabled = true;
        
        const rememberMe = document.getElementById('remember-me').checked;
        if (rememberMe) {
            localStorage.setItem('isUnlocked', 'true');
        } else {
            sessionStorage.setItem('isUnlocked', 'true');
        }
        
        showToast('Access Granted! Welcome back.', 'success');

        setTimeout(() => {
            const pinScreen = document.getElementById('pin-screen');
            const mainContent = document.getElementById('main-content');
            
            pinScreen.classList.remove('anim-fade-in');
            pinScreen.classList.add('anim-fade-out');
            
            setTimeout(() => {
                pinScreen.style.display = 'none';
                mainContent.style.display = 'block';
                mainContent.classList.remove('anim-fade-out');
                
                setGreetingAndQuote(); 
                loadGlanceData(); 
                
                mainContent.classList.add('anim-fade-in');
            }, 400);
        }, 800);
        
    } else {
        showToast('Incorrect PIN. Please try again.', 'error');
        document.getElementById('pin-input').value = '';
        document.getElementById('pin-input').focus();
    }
}

// --- LOGOUT LOGIC ---
function handleLogout() {
    const logoutBtn = document.getElementById('logout-btn');
    const originalBtnHTML = logoutBtn.innerHTML;
    logoutBtn.innerHTML = '<span class="spinner" style="border-top-color: var(--error);"></span> Locking...';
    logoutBtn.disabled = true;
    
    sessionStorage.removeItem('isUnlocked');
    localStorage.removeItem('isUnlocked');
    
    showToast('Portal Locked Successfully.', 'info');

    setTimeout(() => {
        const pinScreen = document.getElementById('pin-screen');
        const mainContent = document.getElementById('main-content');
        
        mainContent.classList.remove('anim-fade-in');
        mainContent.classList.add('anim-fade-out');
        
        setTimeout(() => {
            mainContent.style.display = 'none';
            
            const unlockBtn = document.getElementById('unlock-btn');
            unlockBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg> Unlock`;
            unlockBtn.disabled = false;
            
            const pinInput = document.getElementById('pin-input');
            pinInput.value = '';
            pinInput.disabled = false;
            
            document.getElementById('remember-me').checked = false;
            
            pinScreen.classList.remove('anim-fade-out');
            pinScreen.style.display = 'flex';
            pinScreen.classList.add('anim-fade-in');
            
            logoutBtn.innerHTML = originalBtnHTML;
            logoutBtn.disabled = false;
            
        }, 400);
    }, 800);
}

// Event Listeners
document.getElementById('unlock-btn').addEventListener('click', attemptUnlock);
document.getElementById('pin-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') { attemptUnlock(); }
});
document.getElementById('logout-btn').addEventListener('click', handleLogout);

// --- THEME LOGIC ---
const themeBtn = document.getElementById('theme-btn');
const themeIcon = document.getElementById('theme-icon');
const body = document.body;
const sunPath = "M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z";
const moonPath = "M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z";

if (localStorage.getItem('theme') === 'dark') {
    body.setAttribute('data-theme', 'dark');
    themeIcon.innerHTML = `<path d="${moonPath}" />`;
} else {
    themeIcon.innerHTML = `<path d="${sunPath}" />`;
}

themeBtn.addEventListener('click', () => {
    themeIcon.classList.add('rotate');
    setTimeout(() => {
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
            themeIcon.innerHTML = `<path d="${sunPath}" />`;
            showToast('Light mode activated', 'info');
        } else {
            body.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            themeIcon.innerHTML = `<path d="${moonPath}" />`;
            showToast('Dark mode activated', 'info');
        }
    }, 250);
    setTimeout(() => { themeIcon.classList.remove('rotate'); }, 500);
});
</script>
