<!DOCTYPE html>
<html lang="en">
<head>
<script>
    // Redirect to index if not unlocked
    if (sessionStorage.getItem('isUnlocked') !== 'true' && localStorage.getItem('isUnlocked') !== 'true') {
        window.location.href = 'index.html';
    }
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doubts Dashboard - SSC Portal</title>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root { 
    --primary: #2563eb; 
    --bg: #f8fafc; 
    --card-bg: #ffffff; 
    --text: #1e293b; 
    --border: #e2e8f0; 
    --btn-hover: #1d4ed8;
    --error: #ef4444;
    --success: #22c55e;
    --target: #8b5cf6;
    --target-hover: #7c3aed;
}
[data-theme="dark"] { 
    --primary: #60a5fa; 
    --bg: #0f172a; 
    --card-bg: #1e293b; 
    --text: #f8fafc; 
    --border: #334155; 
    --btn-hover: #3b82f6;
    --error: #f87171;
    --success: #4ade80;
    --target: #a78bfa;
    --target-hover: #8b5cf6;
}

body { 
    font-family: 'Segoe UI', sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    margin: 0; 
    padding: 20px;
    transition: 0.3s; 
}

.container { max-width: 1000px; margin: auto; padding-top: 40px; }

/* Header & Navigation */
.header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; }
.header h2 { margin: 0; font-size: 1.8rem; text-align: center; flex: 1; }
.header-actions { display: flex; gap: 10px; justify-content: flex-end; min-width: 120px; }

.back-btn { background: var(--text); color: var(--bg); border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 500; display: inline-flex; align-items: center; gap: 8px;}
.add-btn { background: var(--target); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
.add-btn:hover { background: var(--target-hover); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15);}

svg { fill: currentColor; }

/* Stat Cards */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
.stat-card { background: var(--card-bg); padding: 25px 20px; border-radius: 12px; border: 1px solid var(--border); text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s;}
.stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
.stat-card h3 { margin: 0 0 10px 0; font-size: 1rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px;}
.stat-card .value { font-size: 2.5rem; font-weight: bold; color: var(--primary); margin: 0;}
.stat-card.total-card { background: var(--primary); color: white; border: none; }
.stat-card.total-card h3 { color: rgba(255,255,255,0.8); }
.stat-card.total-card .value { color: white; }

/* Charts Area */
.charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 40px; }
.chart-container { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
.chart-container h3 { margin-top: 0; margin-bottom: 20px; text-align: center; font-size: 1.2rem; }
.canvas-wrapper { position: relative; height: 300px; width: 100%; }

/* Loading State */
#loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s; }
.spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Theme Toggle */
.theme-toggle { position: absolute; top: 30px; right: 30px; background: var(--card-bg); border: 2px solid var(--border); cursor: pointer; color: var(--text); padding: 12px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 1000;}
.theme-toggle:hover { transform: translateY(-5px); border-color: var(--primary); color: var(--primary); }
.theme-toggle svg { width: 26px; height: 26px; fill: none; stroke: currentColor; stroke-width: 2; transition: transform 0.5s; }
.rotate { transform: rotate(360deg); }

/* Mobile Responsiveness */
@media (max-width: 700px) {
    .header { flex-direction: column; align-items: stretch; gap: 15px; }
    .header h2 { font-size: 1.5rem; order: -1; margin-bottom: 10px; }
    .header-actions { justify-content: center; width: 100%; }
    .back-btn, .add-btn { flex: 1; justify-content: center; }
    .charts-grid { grid-template-columns: 1fr; }
    .theme-toggle { top: 15px; right: 15px; padding: 8px; }
    .theme-toggle svg { width: 20px; height: 20px; }
}
</style>
</head>
<body>

<button class="theme-toggle" id="theme-btn" title="Toggle Theme">
    <svg id="theme-icon" viewBox="0 0 24 24"></svg>
</button>

<div id="loading-overlay">
    <div class="spinner"></div>
    <h3 style="color: var(--text);">Crunching your data...</h3>
</div>

<div class="container">
    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Home
        </button>
        <h2>Doubts Dashboard</h2>
        <div class="header-actions">
            <button class="add-btn" onclick="window.location.href='studydashboard.html'">
                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                Study Dashboard
            </button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card total-card">
            <h3>Total Doubts</h3>
            <p class="value" id="stat-total">0</p>
        </div>
        <div class="stat-card">
            <h3>Maths</h3>
            <p class="value" id="stat-maths">0</p>
        </div>
        <div class="stat-card">
            <h3>English</h3>
            <p class="value" id="stat-english">0</p>
        </div>
        <div class="stat-card">
            <h3>GK</h3>
            <p class="value" id="stat-gk">0</p>
        </div>
        <div class="stat-card">
            <h3>Reasoning</h3>
            <p class="value" id="stat-reasoning">0</p>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-container">
            <h3>Subject Distribution</h3>
            <div class="canvas-wrapper">
                <canvas id="subjectChart"></canvas>
            </div>
        </div>
        <div class="chart-container">
            <h3>Attempt Status</h3>
            <div class="canvas-wrapper">
                <canvas id="statusChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
// ==========================================
// FIREBASE CONFIGURATION
// ==========================================
const firebaseConfig = {
    apiKey: "AIzaSyCAw1Eozvog8hUdZW7THJQBlgze79sCkGk",
    authDomain: "my-site-7fd99.firebaseapp.com",
    projectId: "my-site-7fd99",
    storageBucket: "my-site-7fd99.firebasestorage.app",
    messagingSenderId: "1024490010463",
    appId: "1:1024490010463:web:130447b333eaa7a5f468ea",
    measurementId: "G-WS0G17WRE9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
// ==========================================

// Data storage object
const dashboardData = {
    maths: { total: 0, wrong: 0, unattempted: 0 },
    english: { total: 0, wrong: 0, unattempted: 0 },
    gk: { total: 0, wrong: 0, unattempted: 0 },
    reasoning: { total: 0, wrong: 0, unattempted: 0 }
};

let subjectChartInstance = null;
let statusChartInstance = null;

// The collections to fetch from
const collections = ['mathsDoubts', 'englishDoubts', 'gkDoubts', 'reasoningDoubts'];
let collectionsLoaded = 0;

function fetchDashboardData() {
    collections.forEach(collectionName => {
        const subject = collectionName.replace('Doubts', '');
        
        db.collection(collectionName).onSnapshot((snapshot) => {
            dashboardData[subject].total = snapshot.size;
            dashboardData[subject].wrong = 0;
            dashboardData[subject].unattempted = 0;

            snapshot.forEach(doc => {
                const data = doc.data();
                if (data.status === 'Wrong') dashboardData[subject].wrong++;
                if (data.status === 'Unattempted') dashboardData[subject].unattempted++;
            });

            if (collectionsLoaded < collections.length) {
                collectionsLoaded++;
                if (collectionsLoaded === collections.length) {
                    document.getElementById('loading-overlay').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 500);
                }
            }

            updateDashboardUI();
        }, (error) => {
            console.warn(`Collection ${collectionName} might not exist yet or lacks permissions.`, error);
            if (collectionsLoaded < collections.length) {
                collectionsLoaded++;
                if (collectionsLoaded === collections.length) {
                    document.getElementById('loading-overlay').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 500);
                }
            }
        });
    });
}

function updateDashboardUI() {
    const totalMaths = dashboardData.maths.total;
    const totalEnglish = dashboardData.english.total;
    const totalGK = dashboardData.gk.total;
    const totalReasoning = dashboardData.reasoning.total;
    const grandTotal = totalMaths + totalEnglish + totalGK + totalReasoning;

    document.getElementById('stat-maths').innerText = totalMaths;
    document.getElementById('stat-english').innerText = totalEnglish;
    document.getElementById('stat-gk').innerText = totalGK;
    document.getElementById('stat-reasoning').innerText = totalReasoning;
    document.getElementById('stat-total').innerText = grandTotal;

    const ctxSubject = document.getElementById('subjectChart').getContext('2d');
    const subjectLabels = ['Maths', 'English', 'GK', 'Reasoning'];
    const subjectData = [totalMaths, totalEnglish, totalGK, totalReasoning];
    const subjectColors = ['#3b82f6', '#f59e0b', '#10b981', '#8b5cf6'];

    if (subjectChartInstance) {
        subjectChartInstance.data.datasets[0].data = subjectData;
        subjectChartInstance.update();
    } else {
        subjectChartInstance = new Chart(ctxSubject, {
            type: 'doughnut',
            data: {
                labels: subjectLabels,
                datasets: [{
                    data: subjectData,
                    backgroundColor: subjectColors,
                    borderWidth: 0,
                    hoverOffset: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { color: 'var(--text)', padding: 20, font: { family: "'Segoe UI', sans-serif" } } }
                }
            }
        });
    }

    const totalWrong = dashboardData.maths.wrong + dashboardData.english.wrong + dashboardData.gk.wrong + dashboardData.reasoning.wrong;
    const totalUnattempted = dashboardData.maths.unattempted + dashboardData.english.unattempted + dashboardData.gk.unattempted + dashboardData.reasoning.unattempted;

    const ctxStatus = document.getElementById('statusChart').getContext('2d');
    
    if (statusChartInstance) {
        statusChartInstance.data.datasets[0].data = [totalWrong, totalUnattempted];
        statusChartInstance.update();
    } else {
        statusChartInstance = new Chart(ctxStatus, {
            type: 'pie',
            data: {
                labels: ['Wrong Attempts', 'Unattempted / Skipped'],
                datasets: [{
                    data: [totalWrong, totalUnattempted],
                    backgroundColor: ['#ef4444', '#94a3b8'],
                    borderWidth: 0,
                    hoverOffset: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { color: 'var(--text)', padding: 20, font: { family: "'Segoe UI', sans-serif" } } }
                }
            }
        });
    }
}

// --- THEME LOGIC ---
const themeBtn = document.getElementById('theme-btn');
const themeIcon = document.getElementById('theme-icon');
const body = document.body;
const sunPath = "M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z";
const moonPath = "M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z";

if (localStorage.getItem('theme') === 'dark') {
    body.setAttribute('data-theme', 'dark');
    themeIcon.innerHTML = `<path d="${moonPath}" />`;
} else {
    themeIcon.innerHTML = `<path d="${sunPath}" />`;
}

function updateChartTheme() {
    const textColor = getComputedStyle(document.body).getPropertyValue('--text').trim();
    if(subjectChartInstance) {
        subjectChartInstance.options.plugins.legend.labels.color = textColor;
        subjectChartInstance.update();
    }
    if(statusChartInstance) {
        statusChartInstance.options.plugins.legend.labels.color = textColor;
        statusChartInstance.update();
    }
}

themeBtn.addEventListener('click', () => {
    themeIcon.classList.add('rotate');
    setTimeout(() => {
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
            themeIcon.innerHTML = `<path d="${sunPath}" />`;
        } else {
            body.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            themeIcon.innerHTML = `<path d="${moonPath}" />`;
        }
        updateChartTheme();
    }, 250);
    setTimeout(() => { themeIcon.classList.remove('rotate'); }, 500);
});

window.onload = fetchDashboardData;
</script>

</body>
</html>
